# 蜃景交易所 — 方案 2 極限壓縮：Render Blueprint（全 free tier）
# Free plan 不支援 pserv，故：Redis 改用 Render Key Value；Engine 改為 web（仍僅由 Gateway 內網呼叫）。
# 使用「包含此檔的 repo」：在 Render 建立 Blueprint 時連接你的 GitHub redis-lab-app。

version: "1"
services:
  # 1. 核心記憶體：Render Key Value（Redis 相容，free tier）
  - type: keyvalue
    name: mirage-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  # 2. 地獄火撮合引擎：Rust（web 型態才能在 free 部署，Gateway 以內網 hostname 呼叫）
  - type: web
    name: mirage-engine
    runtime: rust
    plan: free
    buildCommand: cargo build --release --manifest-path apps/engine/Cargo.toml
    startCommand: ./target/release/mirage-engine
    envVars:
      - key: REDIS_ADDR
        fromService:
          type: keyvalue
          name: mirage-redis
          property: connectionString

  # 3. 邊界閘道器：Go（唯一對外 Web Service）
  - type: web
    name: mirage-gateway
    runtime: go
    plan: free
    buildCommand: cd apps/gateway && go build -o bin/gateway .
    startCommand: ./apps/gateway/bin/gateway
    domains:
      - api-mirage-exchange.dennisleehappy.org
    envVars:
      - key: CORS_ORIGINS
        value: https://mirage-exchange.dennisleehappy.org,http://localhost:3000,http://127.0.0.1:3000
      - key: REDIS_ADDR
        fromService:
          type: keyvalue
          name: mirage-redis
          property: connectionString
      - key: ENGINE_URL
        fromService:
          type: web
          name: mirage-engine
          property: hostport
      # 不設 IDENTITY_URL，使用 Gateway 內建虛擬 ID fallback
      - key: GIN_MODE
        value: release
